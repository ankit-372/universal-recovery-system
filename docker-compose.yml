version: '3.8'

services:
  # --- 1. PostgreSQL (Database) ---
  postgres:
    image: postgres:15-alpine
    container_name: urs_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: recovery_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- 2. Redis (Cache & Queue) ---
  redis:
    image: redis:7-alpine
    container_name: urs_redis
    ports:
      - "6379:6379"

  # --- 3. MinIO (Object Storage like S3) ---
  minio:
    image: minio/minio
    container_name: urs_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # API port
      - "9001:9001" # Dashboard port
    volumes:
      - minio_data:/data

  # --- 4. Milvus (Vector Database) ---
  # Using the standalone script for simplicity
  milvus:
    image: milvusdb/milvus:v2.3.0
    container_name: urs_milvus
    command: [ "milvus", "run", "standalone" ]
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: "/var/lib/milvus/etcd"
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
    volumes:
      - milvus_data:/var/lib/milvus

volumes:
  postgres_data:
  minio_data:
  milvus_data:
